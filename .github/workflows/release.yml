name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-release:
    name: Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: lrv
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
            binary: lrv
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary: lrv
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: lrv
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: lrv
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: lrv.exe

    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        shell: bash
        run: echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install root web dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build:web

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install aarch64 Linux linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package Unix archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          archive="lrv-${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz"
          tar -C "target/${{ matrix.target }}/release" -czf "$archive" "${{ matrix.binary }}"
          echo "asset=$archive" >> "$GITHUB_OUTPUT"
        id: package_unix

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "lrv-${{ steps.version.outputs.value }}-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath $archive
          "asset=$archive" >> $env:GITHUB_OUTPUT
        id: package_windows

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package_unix.outputs.asset || steps.package_windows.outputs.asset }}

