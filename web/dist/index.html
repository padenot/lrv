    <title>lrv - local review</title>
    <!-- Local fonts via @font-face; provide system fallbacks if not present -->
    <style>

        font-family: 'Inter';

        font-style: normal;
        font-display: swap;
      }

        font-family: 'JetBrains Mono';

          url('/assets/fonts/JetBrainsMono-Regular.ttf') format('truetype');

    <style>
      /* Dynamic theme variables - set by JavaScript based on Monaco editor theme */
    :root {
      /* Colors are set at runtime by applyThemeToUI() based on the selected Monaco theme */
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-elevated: #2d2d30;
      --border-color: #3e3e42;
      --text-primary: #cccccc;
      --text-secondary: #858585;
      --text-tertiary: #6e6e6e;
      /* --accent-color is set from the theme (e.g., Firefox DevTools Dark uses pink) */
      --accent-color: #007acc;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', 'Monaco', 'Menlo', 'Consolas', monospace;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);
      --ui-transition: 150ms;
    }

      /* Prevent flash of default theme: hide body until UI theme is applied */
      html:not([data-ui-ready='1']) body {
        visibility: hidden;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-sans);
        background: var(--bg-primary);
        color: var(--text-primary);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .header {
        background: var(--bg-secondary);
        padding: 8px 16px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 100;
        flex-shrink: 0;
      }

      .header h1 {
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .review-time {
        color: var(--text-secondary);
        font-size: 12px;
        font-weight: 400;
      }

      .project-info {
        color: var(--text-tertiary);
        font-size: 12px;
        font-weight: 400;
      }

    .project-info-value {
      color: var(--text-secondary);
      font-family: var(--font-mono);
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

      .git-branch {
        color: var(--accent-color);
      }

      .project-info-separator {
        margin: 0 8px;
        color: var(--border-color);
      }

      .header-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .settings-btn {
        background: var(--bg-elevated);
        color: var(--text-primary);
        padding: 6px 10px;
      }

      .settings-btn:hover {
        background: var(--border-color);
      }

      .comment-badge {
        background: var(--bg-elevated);
        color: var(--text-primary);
        padding: 4px 10px;
        border-radius: 0px;
        font-size: 11px;
        font-weight: 500;
      }

      .header button {
        background: var(--accent-color);
        color: white;
        border: none;
        padding: 6px 12px;
        border-radius: 0px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: background 0.15s ease;
      }

      .header button:hover {
        opacity: 0.8;
      }

    .header button:disabled {
      background: var(--text-tertiary);
      cursor: not-allowed;
    }

    /* Smooth, short transitions for theme changes (no heavy animations) */
    @media (prefers-reduced-motion: no-preference) {
      body,
      .header,
      .sidebar,
      .content,
      .submit-modal,
      .comment-badge,
      .file-list li,
      .project-info,
      .settings-btn,
      .header button,
      .btn-primary,
      .btn-secondary,
      .btn-danger {
        transition: background-color var(--ui-transition) ease,
          color var(--ui-transition) ease,
          border-color var(--ui-transition) ease;
      }
    }

      .main {
        display: flex;
        flex: 1;
        min-height: 0;
      }

      .sidebar {
        width: 280px;
        min-width: 150px;
        max-width: 600px;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border-color);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      .sidebar-resizer {
        position: absolute;
        top: 0;
        right: 0;
        width: 4px;
        height: 100%;
        cursor: ew-resize;
        background: transparent;
        z-index: 10;

      .sidebar-resizer:hover,

      }

      .sidebar-section {
        padding: 16px;

      .sidebar-section h2 {

        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 12px;
        font-weight: 600;

      .stats {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-color);
        font-family: var(--font-mono);
      }

      .file-list {
        list-style: none;
      }

      .file-list li {
        padding: 8px 12px;
        cursor: pointer;
        border-radius: 0px;
        font-size: 13px;
        margin-bottom: 2px;
        transition: all 0.15s ease;
        display: flex;
        justify-content: space-between;

        font-family: var(--font-mono);

      .file-list li:hover {
        background: var(--bg-elevated);
      }

      .file-list li.active {
        background: var(--bg-elevated);

      }

      .file-list-actions {

      .file-action-btn {
        width: 100%;
        padding: 8px 12px;
        background: var(--bg-elevated);
        color: var(--text-primary);
        border: none;
        border-radius: 0px;

        font-size: 12px;
        font-weight: 500;

      .file-action-btn:hover {
        background: var(--bg-elevated);

        color: white;

      .file-status.deleted {

      .shortcut-hint {

        padding: 6px 14px;
        border: none;

        font-size: 12px;
        font-weight: 500;
        transition: all 0.15s ease;
      }

      .btn-primary {
        background: var(--accent-color);
        color: white;
      }

      .btn-primary:hover {
        opacity: 0.8;
      }
      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-secondary {
        background: var(--bg-elevated);
        color: var(--text-primary);
      }

      .btn-secondary:hover {
        background: var(--border-color);
      }
      .btn-secondary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-danger {
        background: #c42b1c;

      }

      .btn-danger:hover {
        background: #e81123;
      }
      .btn-danger:disabled {
        opacity: 0.6;

      }

      #expand-top-container {
        position: sticky;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: var(--bg-primary);
        pointer-events: auto;
        display: none;
      }

      #expand-bottom-container {
        position: sticky;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 100;
        background: var(--bg-primary);
        pointer-events: auto;
        display: none;
      }

      #editor-container {
        flex: 1;
        position: relative;
        overflow: visible;
      }

      .expand-controls {
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 8px 20px;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
      }

      .expand-btn {
        background: var(--bg-elevated);
        color: var(--text-primary);
        border: none;
        padding: 4px 12px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        transition: all 0.15s ease;

      .expand-btn:hover {
        background: var(--bg-elevated);

        opacity: 0.5;
        cursor: not-allowed;

      .expand-line {

        height: 1px;

      .line-comment-marker {

      .empty-state {
        padding: 32px;
        text-align: center;
        color: var(--text-secondary);
        font-size: 13px;
      }

      .submit-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.8);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        backdrop-filter: blur(4px);
      }

      .submit-modal {
        background: var(--bg-elevated);
        border: 1px solid var(--border-color);
        border-radius: 0px;
        max-width: 900px;
        max-height: 80vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        box-shadow: var(--shadow-md);
      }

      .submit-modal-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        justify-content: space-between;
        align-items: center;

      .submit-modal-header h2 {
        margin: 0;
        font-size: 16px;
        font-weight: 500;
      }

      .submit-modal-close {
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        font-size: 20px;
        padding: 0;
        width: 28px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 0px;
        transition: all 0.15s ease;

      .submit-modal-close:hover {
        background: var(--bg-elevated);
        color: var(--accent-color);

      .submit-modal-body {
        padding: 20px;

      .comment-preview {

        border: 1px solid var(--border-color);
        border-radius: 0px;
        padding: 16px;

      .comment-preview-header {

      .comment-preview-code {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 0px;
        padding: 10px;
        font-family: var(--font-mono);

        margin-bottom: 10px;

      .comment-preview-code-line {
        white-space: pre;
        line-height: 1.5;
      }

      .comment-preview-code-line.target {
        background: var(--bg-elevated);
        margin: 0 -10px;
        padding: 0 10px;
        border-left: 3px solid var(--accent-color);
      }

      .comment-preview-text {
        font-size: 13px;
        line-height: 1.5;
        color: var(--text-primary);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .submit-modal-footer {
        padding: 16px 20px;
        border-top: 1px solid var(--border-color);
        display: flex;
        justify-content: flex-end;
        gap: 12px;
      }

      .help-modal {
        max-width: 600px;
      }

      .shortcuts-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 16px;
      }

      .shortcuts-table th {
        text-align: left;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border-color);
        font-size: 11px;
        text-transform: uppercase;
        color: var(--text-secondary);
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .shortcuts-table td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border-color);
        font-size: 13px;
      }

      .shortcuts-table tr:last-child td {

      }

      .key-combo {
        display: inline-flex;
        gap: 4px;
        flex-wrap: wrap;
      }

      .key {
        background: var(--bg-elevated);
        color: var(--text-primary);
        padding: 3px 8px;
        border-radius: 0px;
        font-family: var(--font-mono);
        font-size: 11px;
        font-weight: 500;
        border: 1px solid var(--border-color);

      .key-or {

      .settings-form {
        display: flex;

        padding: 10px 0;
      }

      .settings-field {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .settings-field label {
        font-size: 13px;
        font-weight: 500;
        color: var(--text-primary);
      }

      .settings-field select,
      .settings-field input[type='text'] {
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: 0px;
        color: var(--text-primary);
        padding: 8px 12px;
        font-size: 13px;
        font-family: var(--font-sans);
        transition: border-color 0.15s ease;
      }

      .settings-field select:focus,
      .settings-field input[type='text']:focus {
        outline: none;
        border-color: var(--accent-color);
      }

      .settings-field input[type='checkbox'] {
        width: 18px;
        height: 18px;
        cursor: pointer;
        accent-color: var(--accent-color);
      }

      .checkbox-wrapper {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .checkbox-wrapper span {
        color: var(--text-secondary);
      }
    </style>
  </head>

    <!-- Prefer local Monaco; fall back to CDN if missing -->
  <script>
      window.MONACO_VS_BASE = '/assets/vendor/monaco/min/vs';
      (function () {
        var s = document.createElement('script');
        s.src = window.MONACO_VS_BASE + '/loader.js';
        s.onerror = function () {
          window.MONACO_VS_BASE = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs';
          var cdn = document.createElement('script');
          cdn.src = window.MONACO_VS_BASE + '/loader.js';
          document.head.appendChild(cdn);
        };
        s.onload = function () {
          if (window.DEBUG) console.log('[app] monaco loader loaded from', s.src);
        };
        document.head.appendChild(s);
      })();
    </script>

    <script>
      // Global onerror (only when DEBUG) to capture filename/line for syntax errors
      try {
        if (window.DEBUG)
          window.addEventListener('error', function (e) {
            try {
              console.log('[onerror]', e.message, e.filename, e.lineno, e.colno);
            } catch (_) {}
          });
      } catch (_) {}
      // Toggle for optional debug logging (off by default in dist)
      window.DEBUG = false;
      // App readiness flag (set true when first diff is rendered)
      window.__APP_READY = false;
      // Simple performance instrumentation
      // Small DOM helpers for readability
      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

      window.Perf = {
        mark: (name) => {
          performance.mark(name);
        },
        measure: (name, start, end) => {
          performance.measure(name, { start, end });
        },
        recordFileSwitchStart: () => {
          performance.mark('fileSwitchStart');
        },
        recordFileSwitchEnd: () => {
          performance.mark('fileSwitchEnd');
          performance.measure('fileSwitch', { start: 'fileSwitchStart', end: 'fileSwitchEnd' });
        },
        recordAppInitStart: () => {
          performance.mark('appInitStart');
        },
        recordAppInitEnd: () => {
          performance.mark('appInitEnd');
          performance.measure('appInit', { start: 'appInitStart', end: 'appInitEnd' });
        },
        getMetrics: () => {
          const toDurations = (name) =>
            (performance.getEntriesByName(name) || []).map((e) => e.duration);
          return { fileSwitch: toDurations('fileSwitch'), appInit: toDurations('appInit') };
        },
        clear: () => {
          performance.clearMarks();
          performance.clearMeasures();
        },
      };

      // Simple theme → accent mapping (use theme’s intended accent color)
      const UI_THEME_ACCENTS_HEX = {
        'firefox-devtools-dark': '#ff7de9',
        'firefox-devtools-light': '#d92bb4',
        'github-dark': '#58a6ff',
        'github-light': '#0969da',
        'solarized-dark': '#268bd2',
        'solarized-light': '#268bd2',
        'vs-dark': '#007acc',
        'hc-black': '#007acc',
        vs: '#007acc',
        'hc-light': '#007acc',
      };
      try {
        window.UIThemeAccentsHex = UI_THEME_ACCENTS_HEX;
      } catch {}

      function markAppReady() {
        if (window.__APP_READY) return;
        const hasLines =
          document.querySelectorAll('.monaco-editor .view-lines .view-line').length > 0;
        if (hasLines) {
          window.__APP_READY = true;
          if (window.DEBUG) console.log('[app] APP_READY: diff lines visible');
          return;
        }
        const container = document.querySelector('.monaco-editor .view-lines');
        if (container && !window.__APP_READY) {
          if (window.DEBUG) console.log('[app] Waiting for first view-line via MutationObserver');
          const obs = new MutationObserver(() => {
            if (document.querySelectorAll('.monaco-editor .view-lines .view-line').length > 0) {
              window.__APP_READY = true;
              if (window.DEBUG) console.log('[app] APP_READY: observer saw first line');
              obs.disconnect();
            }
          });
          obs.observe(container, { childList: true, subtree: true });
        }
      }
      // Mock diff data
      // Comment Manager
      class CommentManager {
        constructor() {
          this.comments = [];
          this.listeners = [];
        }

        addComment(comment) {
          this.comments.push(comment);
          this.notifyListeners();
        }

        removeComment(index) {
          this.comments.splice(index, 1);
          this.notifyListeners();
        }

        findComment(file, line, side) {
          return this.comments.findIndex(
            (c) => c.file === file && c.start_line === line && c.side === side,
          );
        }

        updateComment(index, newBody) {
          if (index >= 0 && index < this.comments.length) {
            this.comments[index].body = newBody;
            this.notifyListeners();
          }
        }

        getComments() {
          return [...this.comments];
        }

        getCommentsForFile(file) {
          return this.comments.filter((c) => c.file === file);
        }

        onChange(listener) {
          this.listeners.push(listener);
        }

        notifyListeners() {
          this.listeners.forEach((l) => l());
        }
      }

        async init() {
          if (window.DEBUG) console.log('[app] init: start');
          window.Perf.recordAppInitStart();
          // Load config, context, and diff data from API
          const t0 = performance.now();
          const [configResponse, contextResponse, diffResponse] = await Promise.all([
            fetch('/api/config')
              .then((r) => {
                if (window.DEBUG) console.log('[net] /api/config', r.status);
                return r;
              })
              .catch((e) => {
                console.error('[net] /api/config failed', e);
                throw e;
              }),
            fetch('/api/context')
              .then((r) => {
                if (window.DEBUG) console.log('[net] /api/context', r.status);
                return r;
              })
              .catch((e) => {
                console.error('[net] /api/context failed', e);
                throw e;
              }),
            fetch('/api/diff')
              .then((r) => {
                if (window.DEBUG) console.log('[net] /api/diff', r.status);
                return r;
              })
              .catch((e) => {
                console.error('[net] /api/diff failed', e);
                throw e;
              }),
          ]);
          if (window.DEBUG)
            console.log(
              '[app] init: responses received in',
              Math.round(performance.now() - t0),
              'ms',
            );
          this.config = await configResponse.json();
          this.context = await contextResponse.json();
          const diffData = await diffResponse.json();
          if (window.DEBUG) console.log('[app] init: parsed config/context/diff');
          this.files = diffData.files;
          this.stats = diffData.stats;

          // Apply split view setting from config
          this.isInline = !this.config.split_view;

          // Wait for AMD loader to be ready
          await new Promise((resolve, reject) => {
            const start = performance.now();
            const timer = setInterval(() => {
              if (window.require) {
                clearInterval(timer);
                resolve(null);
              }
              if (performance.now() - start > 5000) {
                clearInterval(timer);
                reject(new Error('AMD loader not ready'));
              }
            }, 25);
          });
          window.require.config({
            paths: { vs: window.MONACO_VS_BASE || '/assets/vendor/monaco/min/vs' },
          });

          // Pre-apply theme variables to avoid flash while Monaco loads
          try {
            this.applyThemeToUI(this.config.color_scheme || 'vs-dark');
            document.documentElement.setAttribute('data-ui-ready', '1');
          } catch {}

          return new Promise((resolve) => {
            window.require(['vs/editor/editor.main'], () => {
              if (window.DEBUG) console.log('[app] monaco loaded');
              this.defineCustomThemes();
              this.applyThemeToUI(this.config.color_scheme || 'vs-dark');
              // Accent is set from UI_THEME_ACCENTS_HEX; keep logic simple and deterministic
              try {
                document.documentElement.setAttribute('data-ui-ready', '1');
              } catch {}
              // Set accent directly from our theme map when available (fast, deterministic)
              try {
                const hexMap = window.UIThemeAccentsHex || {};
                const hex = hexMap[this.config.color_scheme || 'vs-dark'];
                if (hex) {
                  const norm = document.createElement('div');
                  norm.style.color = hex;
                  document.body.appendChild(norm);
                  try {
                    const rgb = getComputedStyle(norm).color;
                    if (rgb) document.documentElement.style.setProperty('--accent-color', rgb);
                  } finally {
                    norm.remove();
                  }
                  try {
                    window.__ACCENT_READY = true;
                  } catch {}
                }
              } catch {}
              this.setupUI();
              this.renderFileList();
              if (window.DEBUG) console.log('[app] calling loadFile(0)');
              Promise.resolve(this.loadFile(0)).then(() => {
                // Set review timestamp
                document.getElementById('review-time').textContent = new Date().toLocaleString();
                // Set project info
                this.renderProjectInfo();
                // Wait for paint and record init end
                requestAnimationFrame(() =>
                  requestAnimationFrame(() => {
                    window.Perf.recordAppInitEnd();
                    // Minimal perf log (always on): app init duration
                    try {
                      const e = performance.getEntriesByName('appInit');
                      const d = e && e.length ? e[e.length - 1].duration : null;
                      if (d != null) console.log('[perf] appInit ms:', Math.round(d));
                    } catch {}
                    markAppReady();
                  }),
                );
                resolve();
              });
            });
          });
        }

        async convertHunksToDiff(diffData) {
          // Convert hunk-based diff to full file content format for Monaco
          const files = await Promise.all(
            diffData.files.map(async (file) => {
              // Get the actual file content to properly pad and align
              const f0 = performance.now();
              const [oldResponse, newResponse] = await Promise.all([
                fetch(`/api/file?path=${encodeURIComponent(file.path)}&side=old`)
                  .then((r) => {
                    if (window.DEBUG) console.log('[net] /api/file old', file.path, r.status);
                    return r;
                  })
                  .catch((e) => {
                    console.error('[net] /api/file old failed', file.path, e);
                    throw e;
                  }),
                fetch(`/api/file?path=${encodeURIComponent(file.path)}&side=new`)
                  .then((r) => {
                    if (window.DEBUG) console.log('[net] /api/file new', file.path, r.status);
                    return r;
                  })
                  .catch((e) => {
                    console.error('[net] /api/file new failed', file.path, e);
                    throw e;
                  }),
              ]);
              if (window.DEBUG)
                console.log(
                  '[net] /api/file pair completed for',
                  file.path,
                  Math.round(performance.now() - f0) + 'ms',
                );

              let oldData = { content: '' };
              let newData = { content: '' };
              try {
                if (oldResponse.ok) oldData = await oldResponse.json();
              } catch (e) {
                /* ignore */
              }
              try {
                if (newResponse.ok) newData = await newResponse.json();
              } catch (e) {
                /* ignore */
              }

              const oldAllLines = oldData.content.split('\n');
              const newAllLines = newData.content.split('\n');

              // Find the range covered by hunks
              let oldLineStart = Infinity;
              let oldLineEnd = 0;
              let newLineStart = Infinity;
              let newLineEnd = 0;

              // Track hunk ranges for keyboard navigation
              const hunkRanges = [];

              file.hunks.forEach((hunk) => {
                // Store the first and last new-side lines of this hunk
                const newLines = hunk.lines.filter((l) => l.new_line).map((l) => l.new_line);
                if (newLines.length > 0) {
                  hunkRanges.push({
                    start: Math.min(...newLines),
                    end: Math.max(...newLines),
                  });
                }

                hunk.lines.forEach((line) => {
                  if (line.old_line) {
                    oldLineStart = Math.min(oldLineStart, line.old_line);
                    oldLineEnd = Math.max(oldLineEnd, line.old_line);
                  }
                  if (line.new_line) {
                    newLineStart = Math.min(newLineStart, line.new_line);
                    newLineEnd = Math.max(newLineEnd, line.new_line);
                  }
                });
              });

              // Store hunk ranges
              this.fileHunks[file.path] = hunkRanges;
              this.currentHunkIndex[file.path] = 0;

              // Extract just the visible range from the actual files
              const oldContent = oldAllLines.slice(oldLineStart - 1, oldLineEnd).join('\n');
              const newContent = newAllLines.slice(newLineStart - 1, newLineEnd).join('\n');

              // Track the visible range for this file
              this.fileRanges[file.path] = {
                old: { start: oldLineStart, end: oldLineEnd },
                new: { start: newLineStart, end: newLineEnd },
                hasFullContent: false,
                totalOldLines: oldAllLines.length,
                totalNewLines: newAllLines.length,
              };

              return {
                path: file.path,
                old_path: file.old_path,
                status: file.status,
                old_content: oldContent,
                new_content: newContent,
              };
            }),
          );

          return {
            files,
            stats: diffData.stats,
          };
        }

        applyThemeToUI(themeName) {
          // Derive UI colors from the Monaco theme definitions we register locally.
          const setVar = (k, v) => {
            if (v) document.documentElement.style.setProperty(k, v);
          };

          // Accent from theme rules: prefer the 'keyword' token color defined in our theme
          try {
            const defs = window.UI_THEME_DEFS || {};
            const def = defs[themeName];
            if (def && Array.isArray(def.rules)) {
              const kw = def.rules.find((r) => r && r.token === 'keyword' && r.foreground);
              if (kw && kw.foreground) {
                const hex = '#' + String(kw.foreground).replace(/^#/, '');
                const norm = document.createElement('div');
                norm.style.color = hex;
                document.body.appendChild(norm);
                try {
                  setVar('--accent-color', getComputedStyle(norm).color);
                  window.__ACCENT_READY = true;
                } finally {
                  norm.remove();
                }
              }
            }
          } catch {}

          // If an editor exists, derive surface/text colors from its computed styles
          const editorEl = document.querySelector('.monaco-editor');
          if (editorEl) {
            const cs = getComputedStyle(editorEl);
            setVar('--bg-primary', cs.backgroundColor);
            // Derive secondary/elevated as slight variants
            const overlay = document.querySelector('.monaco-editor .margin') || editorEl;
            const cs2 = getComputedStyle(overlay);
            setVar('--bg-secondary', cs2.backgroundColor || cs.backgroundColor);
            setVar('--bg-elevated', cs2.backgroundColor || cs.backgroundColor);
            // Text colors: use editor foreground if available else fallback to body
            const bodyCs = getComputedStyle(document.body);
            setVar('--text-primary', bodyCs.color);
            setVar('--text-secondary', ''); // allow CSS to fall back; optional refinement
          }
        }

      renderProjectInfo() {

            this.context.working_directory.split('/').pop() || this.context.working_directory;

          if (this.context.title) {

            html += `<span class="project-info-separator">·</span> <span class="project-info-value" title="${safeTitle}">${safeTitle}</span>`;
          }
          html += `<span class="project-info-separator">·</span><span class="project-info-value" title="${this.context.working_directory}">${dirName}</span>`;
