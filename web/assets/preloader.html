<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fox Tail Preloader — Demo</title>
    <style>
      html, body { height: 100%; }
      body {
        margin: 0;
        background: #0d1117;
        display: grid;
        place-items: center;
        color: #c9d1d9;
        font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .wrap { display: grid; gap: 16px; place-items: center; }
      canvas { width: 160px; height: 160px; image-rendering: smooth; }
      .hint { opacity: 0.7; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <canvas id="preloader-canvas" width="160" height="160"></canvas>
      <div class="hint">Fox tail waggle — for Firefox devtools theme</div>
    </div>
    <script src="/assets/preloader.js"></script>
  </body>
  </html>
